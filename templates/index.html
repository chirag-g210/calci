<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="calculator">

        <div class="display">0</div>

        <div class="buttons">

            <button class="op">AC</button>
            <button class="op">DEL</button>
            <button class="op">%</button>
            <button class="op">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="op">*</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="op">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="op">+</button>

            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>

        </div>
    </div>

</body>
</html>
